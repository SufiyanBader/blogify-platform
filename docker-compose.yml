version: '3.8'

services:
  # ---- Data layer ------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: blogify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blogify
      POSTGRES_PASSWORD: blogify
      POSTGRES_DB: blogify
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [blogify]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogify"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blogify-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks: [blogify]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: blogify-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: blogify
      RABBITMQ_DEFAULT_PASS: blogify
    ports:
      - "15672:15672"  # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [blogify]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: blogify-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: blogify
      MINIO_ROOT_PASSWORD: blogify123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console UI
    volumes:
      - minio-data:/data
    networks: [blogify]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Application services ---------------------------------------------
  auth:
    build: ./services/auth
    container_name: blogify-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://blogify:blogify@postgres:5432/blogify
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      APP_VERSION: "1.0.0"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [blogify]

  posts:
    build: ./services/posts
    container_name: blogify-posts
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://blogify:blogify@postgres:5432/blogify
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      APP_VERSION: "1.0.0"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [blogify]

  comments:
    build: ./services/comments
    container_name: blogify-comments
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://blogify:blogify@postgres:5432/blogify
      RABBITMQ_URL: amqp://blogify:blogify@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      APP_VERSION: "1.0.0"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [blogify]

  media:
    build: ./services/media
    container_name: blogify-media
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: blogify
      MINIO_SECRET_KEY: blogify123
      MEDIA_PUBLIC_URL: http://localhost:9000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      APP_VERSION: "1.0.0"
    depends_on:
      minio: { condition: service_healthy }
    networks: [blogify]

  notification-worker:
    build: ./services/notification-worker
    container_name: blogify-notification-worker
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://blogify:blogify@rabbitmq:5672
      APP_VERSION: "1.0.0"
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [blogify]

  # ---- Gateway ------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: blogify-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - posts
      - comments
      - media
    networks: [blogify]

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:

networks:
  blogify:
    driver: bridge
