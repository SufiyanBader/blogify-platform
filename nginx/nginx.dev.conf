upstream auth_service { server auth:4001; }
upstream posts_service { server posts:4002; }
upstream comments_service { server comments:4003; }
upstream media_service { server media:4004; }

server {
    listen 80;
    server_name localhost;
    client_max_body_size 12M;

    location /api/auth/ {
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/posts/ {
        rewrite ^/api/posts/(.*) /$1 break;
        proxy_pass http://posts_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Comments are nested under posts: /api/posts/:id/comments
    location ~ ^/api/posts/([^/]+)/comments {
        proxy_pass http://comments_service/posts/$1/comments$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/comments/ {
        rewrite ^/api/comments/(.*) /$1 break;
        proxy_pass http://comments_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/media/ {
        rewrite ^/api/media/(.*) /$1 break;
        proxy_pass http://media_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 12M;
    }

    location /health {
        return 200 'gateway ok\n';
        add_header Content-Type text/plain;
    }
}
