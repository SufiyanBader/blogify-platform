name: Build & Push Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'docker-compose.yml'

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth: 'services/auth/**'
            posts: 'services/posts/**'
            comments: 'services/comments/**'
            media: 'services/media/**'
            notification-worker: 'services/notification-worker/**'

  build-and-push:
    name: Build & push (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/blogify-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}

  notify-infra-repo:
    name: Trigger deployment in infra repo
    needs: [detect-changes, build-and-push]
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Dispatch deploy event to blogify-infra
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.INFRA_REPO_PAT }}" \
            https://api.github.com/repos/${{ secrets.INFRA_REPO_OWNER }}/blogify-infra/dispatches \
            -d "{\"event_type\":\"deploy-services\",\"client_payload\":{\"image_tag\":\"${{ steps.sha.outputs.short_sha }}\",\"services\":${{ needs.detect-changes.outputs.services }},\"triggered_by\":\"${{ github.actor }}\",\"commit_sha\":\"${{ github.sha }}\"}}"
          echo "Dispatch sent"